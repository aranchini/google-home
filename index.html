<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구글 홈 화면</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div id="home">
        <header>
            <div class="header-menu">
                <a href="#">Gmail</a>
                <a href="#">이미지</a>
                <img src="바둑판.png" alt="바둑판">
                <img src="프로필.webp" alt="프로필">
            </div>
        </header>
        <main class="main">
             <h1><img src="logo.png" alt="구글" ></h1>
                <div class="search-box">
                    <img src="돋보기.png" alt="돋보기" class="search-icon">
                    <input type="text" placeholder="Google 검색 또는 URL 입력" class="search-input">
                    <img src="마이크.png" alt="마이크" class="mic-icon">
                    <img src="카메라.png" alt="카메라" class="camera-icon">
                </div>
                <div class="shortcut-container">
                    <div class="shortcut-item">
                        <button><img src="플러스.png" alt="플러스"></button>
                        <span>바로가기 추가</span>
                    </div>
                </div>
        </main>
       <footer>
            <div class="footer-menu">
                <button><img src="연필.png" alt="연필">Chrome 맞춤설정</button>
            </div>
       </footer>
    </div>
</body>
</html>
